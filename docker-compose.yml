services:
  server:
    build: ./server
    network_mode: host
    volumes:
      - db-data:/app/data
    environment:
      - DATABASE_URL=/app/data/hookbot.db
      - FIRMWARE_DIR=/app/data/firmware
      - BIND_ADDR=0.0.0.0:3000
      - ADMIN_PASSWORD=d77083c22db2f3e2f01981e7ae9c2c5f87471134c4b5018c
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  db-data:
