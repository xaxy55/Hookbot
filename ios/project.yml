name: Hookbot
options:
  bundleIdPrefix: com.mr-ai.hookbot
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "56YDP2JJ35"
    CODE_SIGN_STYLE: Automatic

targets:
  Hookbot:
    type: application
    platform: iOS
    supportedDestinations: [iOS]
    scheme:
      testTargets:
        - HookbotUITests
    sources:
      - path: Hookbot
        excludes:
          - "**/.DS_Store"
          - "GameScene.sks"
          - "GameScene.swift"
          - "GameViewController.swift"
          - "AppDelegate.swift"
          - "Actions.sks"
          - "Base.lproj"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    entitlements:
      path: Hookbot/Hookbot.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.usernotifications.time-sensitive: true
    dependencies:
      - target: HookbotiOSWidget
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "Hookbot"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Hookbot needs local network access to receive state changes from Claude Code and communicate with the management server."
        INFOPLIST_KEY_NSBonjourServices:
          - "_http._tcp"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Hookbot reads your step count to energize your avatar when you hit your daily goal."
        INFOPLIST_KEY_NSSupportsLiveActivities: true
        INFOPLIST_KEY_NSCameraUsageDescription: "Hookbot uses the camera to scan QR codes on devices for quick claiming."
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Hookbot uses Bluetooth to discover nearby unclaimed devices for setup."
        INFOPLIST_KEY_NFCReaderUsageDescription: "Hookbot uses NFC to pair with a buddy's phone by tapping devices together."
        PRODUCT_BUNDLE_IDENTIFIER: com.mr-ai.hookbot
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0

  HookbotWatch:
    type: application
    platform: watchOS
    scheme:
      gatherCoverageData: false
    sources:
      - path: HookbotWatch
        excludes:
          - "**/.DS_Store"
          - "Complications/**"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.mr-ai.hookbot
        INFOPLIST_KEY_CFBundleDisplayName: "Hookbot"
        PRODUCT_BUNDLE_IDENTIFIER: com.mr-ai.hookbot.watchkitapp
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    dependencies:
      - target: Hookbot
        embed: false
        link: false
      - target: HookbotWidgetExtension

  HookbotWidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: HookbotWatch/Complications
        excludes:
          - "**/.DS_Store"
    info:
      path: HookbotWatch/Complications/Info.plist
      properties:
        CFBundleDisplayName: "Hookbot"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mr-ai.hookbot.watchkitapp.widget
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  HookbotiOSWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: HookbotiOSWidget
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    info:
      path: HookbotiOSWidget/Info.plist
      properties:
        CFBundleDisplayName: "Hookbot"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mr-ai.hookbot.widget
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        GENERATE_INFOPLIST_FILE: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  HookbotUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HookbotUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Hookbot
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.mr-ai.hookbot.uitests
