name: Hookbot
options:
  bundleIdPrefix: com.mr-ai.hookbot
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "56YDP2JJ35"
    CODE_SIGN_STYLE: Automatic

targets:
  Hookbot:
    type: application
    platform: iOS
    sources:
      - path: Hookbot
        excludes:
          - "**/.DS_Store"
          - "GameScene.sks"
          - "GameScene.swift"
          - "GameViewController.swift"
          - "AppDelegate.swift"
          - "Actions.sks"
          - "Base.lproj"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "Hookbot"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Hookbot needs local network access to receive state changes from Claude Code and communicate with the management server."
        INFOPLIST_KEY_NSBonjourServices:
          - "_http._tcp"
        PRODUCT_BUNDLE_IDENTIFIER: com.mr-ai.hookbot
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0

  HookbotWatch:
    type: application
    platform: watchOS
    sources:
      - path: HookbotWatch
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.mr-ai.hookbot
        INFOPLIST_KEY_CFBundleDisplayName: "Hookbot"
        PRODUCT_BUNDLE_IDENTIFIER: com.mr-ai.hookbot.watchkitapp
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    dependencies:
      - target: Hookbot
        embed: false
        link: false
