name: Deploy Server to GCE

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "server/**"

env:
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hookbot/server

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" ./server
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to GCE
        env:
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          API_KEY: ${{ secrets.API_KEY }}
          WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
          WORKOS_CLIENT_ID: ${{ secrets.WORKOS_CLIENT_ID }}
        run: |
          gcloud compute instances update-container hookbot-server \
            --zone=us-central1-a \
            --container-image="$IMAGE:${{ github.sha }}" \
            --container-env="ALLOWED_ORIGINS=${ALLOWED_ORIGINS},ADMIN_PASSWORD=${ADMIN_PASSWORD},API_KEY=${API_KEY},WORKOS_API_KEY=${WORKOS_API_KEY},WORKOS_CLIENT_ID=${WORKOS_CLIENT_ID}"
